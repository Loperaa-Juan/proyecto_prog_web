<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="ComplexityLab — Plataforma colaborativa de desafíos de programación y algoritmos" />

    <!-- Preconexión a Google Fonts para mejor rendimiento -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />

    <title>ComplexityLab — Desafíos de Programación</title>

    <!--
      Script de tema anticipado: aplica la clase "dark" ANTES del primer render
      de React para evitar el parpadeo claro→oscuro al recargar la página.
      El tema por defecto es oscuro si no hay preferencia guardada.
    -->
    <script>
      (function () {
        try {
          var t = localStorage.getItem('complexitylab-theme') || 'dark';
          if (t === 'dark') document.documentElement.classList.add('dark');
        } catch (_) {
          document.documentElement.classList.add('dark');
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
